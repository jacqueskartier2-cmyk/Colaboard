/* ── SHARED UI HELPERS ───────────────────────────────────── */
function btn(v=“primary”,sz=“md”){
const S={sm:{padding:“5px 12px”,fontSize:12},md:{padding:“9px 18px”,fontSize:13},lg:{padding:“13px 26px”,fontSize:14}}[sz];
const V={
primary:{background:C.blue,color:C.white,border:“none”},
dark:{background:C.black,color:C.white,border:“none”},
outline:{background:C.white,color:C.black,border:`1.5px solid ${C.gray200}`},
green:{background:C.green,color:C.white,border:“none”},
amber:{background:C.amberBg,color:C.amber,border:“none”},
purple:{background:C.purple,color:C.white,border:“none”},
ghost:{background:“transparent”,color:C.blue,border:`1.5px solid ${C.blue}`},
}[v];
return {…S,…V,borderRadius:9,fontWeight:600,cursor:“pointer”,fontFamily:F.body,display:“inline-flex”,alignItems:“center”,gap:5,transition:“opacity 0.15s”};
}
function Badge({label,color=C.gray600,bg=C.gray100}){
return <span style={{display:“inline-flex”,alignItems:“center”,padding:“2px 9px”,borderRadius:20,fontSize:11,fontWeight:600,background:bg,color,letterSpacing:“0.2px”}}>{label}</span>;
}
function Avatar({name,size=36}){
const i=name.split(” “).map(w=>w[0]).join(””).toUpperCase().slice(0,2);
return <div style={{width:size,height:size,borderRadius:“50%”,background:C.blue,color:C.white,display:“flex”,alignItems:“center”,justifyContent:“center”,fontSize:size*0.36,fontWeight:700,flexShrink:0}}>{i}</div>;
}
function Card({children,style={}}){
return <div style={{background:C.white,borderRadius:14,border:`1px solid ${C.gray200}`,padding:22,…style}}>{children}</div>;
}
function Lbl({children}){
return <div style={{fontSize:11,fontWeight:700,color:C.gray600,letterSpacing:“0.6px”,textTransform:“uppercase”,marginBottom:5}}>{children}</div>;
}
function Input({value,onChange,placeholder,type=“text”,style={}}){
return <input type={type} value={value} onChange={onChange} placeholder={placeholder}
style={{width:“100%”,padding:“10px 13px”,borderRadius:9,fontSize:14,border:`1px solid ${C.gray200}`,fontFamily:F.body,background:C.white,color:C.black,outline:“none”,boxSizing:“border-box”,…style}}/>;
}
function Textarea({value,onChange,placeholder,rows=4}){
return <textarea value={value} onChange={onChange} placeholder={placeholder} rows={rows}
style={{width:“100%”,padding:“10px 13px”,borderRadius:9,fontSize:14,border:`1px solid ${C.gray200}`,fontFamily:F.body,background:C.white,color:C.black,outline:“none”,boxSizing:“border-box”,resize:“vertical”}}/>;
}
function StatBox({label,value,icon,color=C.blue}){
return(
<div style={{background:C.white,borderRadius:12,border:`1px solid ${C.gray200}`,padding:“16px 20px”,display:“flex”,alignItems:“center”,gap:14}}>
<div style={{width:42,height:42,borderRadius:11,background:`${color}18`,display:“flex”,alignItems:“center”,justifyContent:“center”,fontSize:20,flexShrink:0}}>{icon}</div>
<div>
<div style={{fontSize:24,fontWeight:800,lineHeight:1}}>{value}</div>
<div style={{fontSize:11,color:C.gray600,fontWeight:600,marginTop:3,letterSpacing:“0.3px”,textTransform:“uppercase”}}>{label}</div>
</div>
</div>
);
}
